<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VideoPro Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #0f0f13;
            --bg-secondary: #16161d;
            --bg-tertiary: #1e1e28;
            --text-primary: #e8e8ed;
            --text-secondary: #a0a0b0;
            --text-tertiary: #94a3b8;
            --accent: #7c3aed;
            --green: #10b981;
            --green-soft: rgba(16, 185, 129, 0.12);
            --orange: #f59e0b;
            --orange-soft: rgba(245, 158, 11, 0.12);
            --red: #ef4444;
            --red-soft: rgba(239, 68, 68, 0.12);
            --blue: #3b82f6;
            --blue-soft: rgba(59, 130, 246, 0.12);
            --pink: #ec4899;
            --pink-soft: rgba(236, 72, 153, 0.12);
            --border: rgba(255, 255, 255, 0.06);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .app { display: flex; min-height: 100vh; }
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 998;
        }
        .sidebar-logo { font-size: 1.25rem; font-weight: 700; margin-bottom: 28px; color: var(--accent); }
        .nav-section { margin-bottom: 20px; }
        .nav-section-title { font-size: 0.7rem; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; padding: 0 8px; font-weight: 600; }
        .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm);
            cursor: pointer; color: var(--text-secondary); font-size: 0.875rem;
            margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-item:active { background: var(--bg-tertiary); }
        .nav-item.active { background: rgba(124, 58, 237, 0.12); color: var(--accent); font-weight: 600; }
        .main-content { flex: 1; padding: 24px 28px; overflow-y: auto; max-height: 100vh; }
        .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 24px; }
        .stat-mini { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; }
        .stat-mini-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; font-weight: 600; }
        .stat-mini-value { font-size: 1.5rem; font-weight: 700; }
        .cards-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 768px) { .cards-grid { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); } }
        .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .card:active { background: var(--bg-tertiary); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .card-client-name { font-weight: 700; font-size: 0.95rem; }
        .card-project-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
        .badge { font-size: 0.6rem; text-transform: uppercase; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
        .badge-purple { background: rgba(124, 58, 237, 0.12); color: #a78bfa; }
        .badge-green { background: var(--green-soft); color: var(--green); }
        .badge-pink { background: var(--pink-soft); color: var(--pink); }
        .card-meta { display: flex; flex-direction: column; gap: 5px; font-size: 0.8rem; color: var(--text-secondary); }
        .card-meta-row { display: flex; justify-content: space-between; }
        .card-meta-label { color: var(--text-tertiary); font-size: 0.7rem; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .data-table th { text-align: left; padding: 10px 14px; font-size: 0.7rem; text-transform: uppercase; color: var(--text-tertiary); font-weight: 600; border-bottom: 1px solid var(--border); }
        .data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
        .data-table tr:hover td { background: var(--bg-tertiary); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .modal-overlay.hidden { display: none; }
        .modal { background: var(--bg-secondary); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius-lg); padding: 24px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 1.2rem; margin-bottom: 16px; font-weight: 600; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.65rem; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 9px 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.85rem; font-family: inherit; }
        .form-row { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 500px) { .form-row { grid-template-columns: 1fr 1fr; } }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
        .btn { padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; font-family: inherit; -webkit-tap-highlight-color: transparent; }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
        .btn-danger { background: var(--red); border-color: var(--red); color: white; font-weight: 600; }
        .btn-sm { padding: 5px 10px; font-size: 0.7rem; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .text-muted { color: var(--text-tertiary); font-size: 0.8rem; }
        .mt-2 { margin-top: 8px; }
        .mb-3 { margin-bottom: 16px; }
        .hidden { display: none !important; }
        .status-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
        .status-indicator.online { background: var(--green); }
        .status-indicator.offline { background: var(--red); }
        .quick-add-client { background: var(--bg-tertiary); border: 1px dashed var(--border); border-radius: var(--radius-md); padding: 12px; margin-top: 6px; }
        .select-with-add { display: flex; gap: 6px; align-items: flex-end; }
        .select-with-add select { flex: 1; }
        .finance-section { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; margin-top: 6px; }
        .finance-section h4 { font-size: 0.75rem; font-weight: 600; margin-bottom: 10px; }
        .toggle-switch { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .toggle-switch input { display: none; }
        .toggle-track { width: 36px; height: 20px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px; position: relative; }
        .toggle-track::after { content: ''; position: absolute; width: 16px; height: 16px; background: var(--text-secondary); border-radius: 50%; top: 1px; left: 1px; }
        .toggle-switch input:checked + .toggle-track { background: var(--accent); }
        .toggle-switch input:checked + .toggle-track::after { left: 17px; background: white; }
        .calendar-month { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-top: 12px; }
        .calendar-day-header { text-align: center; font-size: 0.65rem; font-weight: 600; color: var(--text-tertiary); padding: 8px 0; }
        .calendar-day { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; padding: 6px; min-height: 60px; font-size: 0.7rem; }
        .calendar-day.today { border-color: var(--accent); }
        .calendar-day.other-month { opacity: 0.3; }
        .calendar-day-number { font-weight: 600; margin-bottom: 3px; }
        .calendar-event { font-size: 0.55rem; padding: 1px 3px; border-radius: 2px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .calendar-event.filmavimas { background: var(--blue-soft); color: var(--blue); }
        .calendar-event.terminas { background: var(--orange-soft); color: var(--orange); }
        
        /* MOBILUS MYGTUKAS */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        @media (max-width: 768px) {
            .sidebar {
                display: none;
                position: fixed;
                left: 0;
                top: 0;
                width: 260px;
                z-index: 998;
            }
            .sidebar.open { display: flex; }
            .main-content { padding: 12px 10px; }
            .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
            .page-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">🎬 VideoPro Hub</div>
        <div style="font-size:0.65rem;color:var(--text-tertiary);margin-bottom:14px;display:flex;align-items:center;gap:4px;">
            <span class="status-indicator" id="dbStatus"></span>
            <span id="dbStatusText">Jungiamasi...</span>
        </div>
        <nav>
            <div class="nav-section">
                <div class="nav-section-title">Pagrindinis</div>
                <button class="nav-item active" data-page="dashboard" onclick="keistiPuslapį('dashboard', this); uždarytiMobilųMeniu();">📊 Panelė</button>
                <button class="nav-item" data-page="clients" onclick="keistiPuslapį('clients', this); uždarytiMobilųMeniu();">👥 Klientai</button>
                <button class="nav-item" data-page="calendar" onclick="keistiPuslapį('calendar', this); uždarytiMobilųMeniu();">📅 Kalendorius</button>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">Projektai</div>
                <button class="nav-item" data-page="projects" onclick="keistiPuslapį('projects', this); uždarytiMobilųMeniu();">📁 Visi projektai</button>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">Finansai</div>
                <button class="nav-item" data-page="finance" onclick="keistiPuslapį('finance', this); uždarytiMobilųMeniu();">💰 Finansai</button>
            </div>
        </nav>
    </aside>
    <main class="main-content" id="mainContent"></main>
</div>

<!-- MOBILUS MENIU MYGTUKAS -->
<button class="mobile-menu-btn" id="mobileMenuBtn" onclick="perjungtiMobilųMeniu()">☰</button>

<div class="modal-overlay hidden" id="modalKlientas">
    <div class="modal">
        <h2 id="modalKlientasTitle">Naujas klientas</h2>
        <form id="formaKlientas" onsubmit="return išsaugotiKlientą(event)">
            <input type="hidden" id="klientoId">
            <div class="form-row"><div class="form-group"><label>Vardas, Pavardė *</label><input type="text" id="klVardas" required></div><div class="form-group"><label>Įmonė</label><input type="text" id="klImone"></div></div>
            <div class="form-row"><div class="form-group"><label>Telefonas</label><input type="text" id="klTel"></div><div class="form-group"><label>El. paštas</label><input type="email" id="klEmail"></div></div>
            <div class="modal-actions">
                <button type="button" class="btn btn-danger btn-sm" id="btnTrintiKlientą" style="display:none;margin-right:auto;" onclick="trintiKlientą()">Ištrinti</button>
                <button type="button" class="btn" onclick="uždarytiModalą('modalKlientas')">Atšaukti</button>
                <button type="submit" class="btn btn-primary">Išsaugoti</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay hidden" id="modalProjektas">
    <div class="modal">
        <h2 id="modalProjektasTitle">Naujas projektas</h2>
        <form id="formaProjektas" onsubmit="return išsaugotiProjektą(event)">
            <input type="hidden" id="projId">
            <div class="form-group"><label>Klientas *</label><div class="select-with-add"><select id="projKlientas" required><option value="">-- Pasirinkite --</option></select><button type="button" class="btn btn-sm" onclick="parodytiGreitąKlientoPridėjimą()" id="btnPridėtiKlientą">+</button></div></div>
            <div id="greitasKlientoPridėjimas" class="quick-add-client hidden">
                <h4>Greitas kliento sukūrimas</h4>
                <div class="form-group"><label>Vardas *</label><input type="text" id="greitasKlVardas"></div>
                <button type="button" class="btn btn-primary btn-sm" onclick="sukurtiGreitąKlientą()">Sukurti</button>
            </div>
            <div class="form-row"><div class="form-group"><label>Pavadinimas *</label><input type="text" id="projPavadinimas" required></div><div class="form-group"><label>Tipas *</label><select id="projTipas" required><option value="Reklama">Reklama</option><option value="Vestuvės">Vestuvės</option><option value="Podcast">Podcast</option><option value="Motion Design">Motion Design</option><option value="Kita">Kita</option></select></div></div>
            <div class="form-row"><div class="form-group"><label>Filmavimo data</label><input type="date" id="projFilmData"></div><div class="form-group"><label>Terminas *</label><input type="date" id="projTerminas" required></div></div>
            <div class="form-row"><div class="form-group"><label>Lokacija</label><input type="text" id="projLokacija"></div><div class="form-group"><label>Įranga</label><input type="text" id="projIranga"></div></div>
            <div class="form-group"><label>Statusas</label><select id="projStatusas"><option value="Aktyvus">Aktyvus</option><option value="Atlikta">Atlikta</option><option value="Archyvuotas">Archyvuotas</option></select></div>
            <div class="finance-section">
                <h4>Finansai</h4>
                <div class="form-group"><label class="toggle-switch"><input type="checkbox" id="projNeapmokamas" onchange="perjungtiFinansųLaukelius()"><span class="toggle-track"></span><span style="font-size:0.75rem;">Neapmokamas / Portfolio</span></label></div>
                <div id="finansiniaiLaukeliai">
                    <div class="form-row"><div class="form-group"><label>Biudžetas (€)</label><input type="number" id="projBiudzetas" step="0.01" value="0"></div><div class="form-group"><label>Avansas (€)</label><input type="number" id="projAvansas" step="0.01" value="0"></div></div>
                    <div class="form-row"><div class="form-group"><label>Galutinis (€)</label><input type="number" id="projGalutinis" step="0.01" value="0"></div><div class="form-group"><label>Išlaidos (€)</label><input type="number" id="projIslaidos" step="0.01" value="0"></div></div>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-danger btn-sm" id="btnTrintiProjektą" style="display:none;margin-right:auto;" onclick="trintiProjektą()">Ištrinti</button>
                <button type="button" class="btn" onclick="uždarytiModalą('modalProjektas')">Atšaukti</button>
                <button type="submit" class="btn btn-primary">Išsaugoti</button>
            </div>
        </form>
    </div>
</div>

<script>
var SUPABASE_URL = 'https://roxfqctfzmmdcwflcipo.supabase.co';
var SUPABASE_KEY = 'sb_publishable_oFlnAEOdezuXwBoMO8xZ0A_DhutIiO4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var klientai = [];
var projektai = [];
var dabartinisPuslapis = 'dashboard';
var kalendoriausData = new Date();

function atnaujintiDBStatusą(busena, tekstas) {
    var ind = document.getElementById('dbStatus');
    var txt = document.getElementById('dbStatusText');
    if (ind) ind.className = 'status-indicator ' + busena;
    if (txt) txt.textContent = tekstas;
}

async function užkrautiDuomenis() {
    try {
        atnaujintiDBStatusą('syncing', 'Kraunama...');
        var kData = await supabase.from('klientai').select('*').order('vardas');
        if (kData.error) throw kData.error;
        klientai = kData.data || [];
        var pData = await supabase.from('projektai').select('*').order('terminas');
        if (pData.error) throw pData.error;
        projektai = pData.data || [];
        atnaujintiDBStatusą('online', 'Online');
        atvaizduotiPuslapį();
    } catch (e) {
        atnaujintiDBStatusą('offline', 'Klaida');
        atvaizduotiPuslapį();
    }
}

function keistiPuslapį(page, el) {
    dabartinisPuslapis = page;
    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
    if (el) el.classList.add('active');
    atvaizduotiPuslapį();
}

function atvaizduotiPuslapį() {
    var c = document.getElementById('mainContent');
    if (dabartinisPuslapis === 'dashboard') c.innerHTML = genDashboard();
    else if (dabartinisPuslapis === 'clients') c.innerHTML = genKlientai();
    else if (dabartinisPuslapis === 'projects') c.innerHTML = genProjektai();
    else if (dabartinisPuslapis === 'finance') c.innerHTML = genFinansai();
    else if (dabartinisPuslapis === 'calendar') c.innerHTML = genKalendorius();
}

function formatuotiDatą(d) {
    if (!d) return '-';
    var dalys = d.split('-');
    if (dalys.length !== 3) return d;
    return dalys[2] + '.' + dalys[1] + '.' + dalys[0];
}

function genDashboard() {
    var aktyvus = projektai.filter(function(p) { return p.statusas !== 'Atlikta' && p.statusas !== 'Archyvuotas'; });
    var h = '<h1 class="page-title">Panelė</h1>';
    h += '<div class="stats-row">';
    h += '<div class="stat-mini"><div class="stat-mini-label">Projektai</div><div class="stat-mini-value">' + projektai.length + '</div></div>';
    h += '<div class="stat-mini"><div class="stat-mini-label">Aktyvūs</div><div class="stat-mini-value">' + aktyvus.length + '</div></div>';
    h += '<div class="stat-mini"><div class="stat-mini-label">Klientai</div><div class="stat-mini-value">' + klientai.length + '</div></div>';
    h += '</div>';
    h += '<button class="btn btn-primary" onclick="atidarytiProjektoModalą()" style="margin-bottom:16px;">+ Naujas projektas</button>';
    h += '<div class="cards-grid">';
    for (var i = 0; i < projektai.length; i++) {
        var p = projektai[i];
        var kl = null;
        for (var j = 0; j < klientai.length; j++) { if (klientai[j].id === p.klientas_id) { kl = klientai[j]; break; } }
        var likutis = p.neapmokamas ? 0 : ((p.biudzetas||0) - (p.avansas||0) - (p.galutinis||0));
        h += '<div class="card" onclick="atidarytiProjektoModalą(\'' + p.id + '\')">';
        h += '<div class="card-header"><div><div class="card-client-name">' + (kl?kl.vardas:'?') + '</div></div>';
        h += '<span class="badge badge-purple">' + p.tipas + '</span>';
        if (p.neapmokamas) h += ' <span class="badge badge-pink">Portfolio</span>';
        h += '</div>';
        h += '<div class="card-project-title">' + p.pavadinimas + '</div>';
        h += '<div class="card-meta">';
        h += '<div class="card-meta-row"><span class="card-meta-label">🎥 Filmavimas</span><span>' + formatuotiDatą(p.film_data) + '</span></div>';
        h += '<div class="card-meta-row"><span class="card-meta-label">⏰ Terminas</span><span>' + formatuotiDatą(p.terminas) + '</span></div>';
        if (p.lokacija) h += '<div class="card-meta-row"><span class="card-meta-label">📍</span><span>' + p.lokacija + '</span></div>';
        if (!p.neapmokamas) {
            h += '<div class="card-meta-row"><span class="card-meta-label">💰 Likutis</span><span style="color:' + (likutis > 0 ? '#f59e0b' : '#10b981') + ';font-weight:600;">€' + likutis.toFixed(2) + '</span></div>';
        }
        h += '</div></div>';
    }
    h += '</div>';
    if (projektai.length === 0) h += '<p class="text-muted mt-2">Nėra projektų. Spauskite "+ Naujas projektas".</p>';
    return h;
}

function genKlientai() {
    var h = '<div class="flex-between mb-3"><h1 class="page-title">Klientai</h1><button class="btn btn-primary btn-sm" onclick="atidarytiKlientoModalą()">+ Naujas</button></div>';
    if (klientai.length === 0) return h + '<p class="text-muted">Nėra klientų.</p>';
    h += '<table class="data-table"><thead><tr><th>Vardas</th><th>Įmonė</th><th>Tel.</th><th>Projektų</th><th></th></tr></thead><tbody>';
    for (var i = 0; i < klientai.length; i++) {
        var k = klientai[i];
        var kp = projektai.filter(function(p) { return p.klientas_id === k.id; });
        h += '<tr><td>' + k.vardas + '</td><td>' + (k.imone||'-') + '</td><td>' + (k.tel||'-') + '</td><td>' + kp.length + '</td>';
        h += '<td><button class="btn btn-sm" onclick="atidarytiKlientoModalą(\'' + k.id + '\')">Red.</button></td></tr>';
    }
    h += '</tbody></table>';
    return h;
}

function genProjektai() {
    var h = '<div class="flex-between mb-3"><h1 class="page-title">Projektai</h1><button class="btn btn-primary btn-sm" onclick="atidarytiProjektoModalą()">+ Naujas</button></div>';
    if (projektai.length === 0) return h + '<p class="text-muted">Nėra projektų.</p>';
    h += '<table class="data-table"><thead><tr><th>Projektas</th><th>Klientas</th><th>Terminas</th><th>Likutis</th><th></th></tr></thead><tbody>';
    for (var i = 0; i < projektai.length; i++) {
        var p = projektai[i];
        var kl = null;
        for (var j = 0; j < klientai.length; j++) { if (klientai[j].id === p.klientas_id) { kl = klientai[j]; break; } }
        var l = p.neapmokamas ? 0 : ((p.biudzetas||0) - (p.avansas||0) - (p.galutinis||0));
        h += '<tr><td>' + p.pavadinimas + '</td><td>' + (kl?kl.vardas:'?') + '</td><td>' + formatuotiDatą(p.terminas) + '</td>';
        h += '<td style="color:' + (l>0?'#f59e0b':'#10b981') + ';font-weight:600;">€' + l.toFixed(2) + '</td>';
        h += '<td><button class="btn btn-sm" onclick="atidarytiProjektoModalą(\'' + p.id + '\')">Red.</button></td></tr>';
    }
    h += '</tbody></table>';
    return h;
}

function genFinansai() {
    var h = '<h1 class="page-title">Finansų suvestinė</h1>';
    var mokami = projektai.filter(function(p) { return !p.neapmokamas; });
    var portfolio = projektai.filter(function(p) { return p.neapmokamas; });
    var bendrasBiudz = mokami.reduce(function(s, p) { return s + (p.biudzetas||0); }, 0);
    var bendrasAv = mokami.reduce(function(s, p) { return s + (p.avansas||0); }, 0);
    var bendrasGal = mokami.reduce(function(s, p) { return s + (p.galutinis||0); }, 0);
    var bendrasLik = bendrasBiudz - bendrasAv - bendrasGal;
    h += '<div class="stats-row">';
    h += '<div class="stat-mini"><div class="stat-mini-label">Biudžetas</div><div class="stat-mini-value">€' + bendrasBiudz.toFixed(0) + '</div></div>';
    h += '<div class="stat-mini"><div class="stat-mini-label">Avansai</div><div class="stat-mini-value" style="color:#3b82f6">€' + bendrasAv.toFixed(0) + '</div></div>';
    h += '<div class="stat-mini"><div class="stat-mini-label">Likutis</div><div class="stat-mini-value" style="color:#f59e0b">€' + bendrasLik.toFixed(0) + '</div></div>';
    h += '<div class="stat-mini"><div class="stat-mini-label">Portfolio</div><div class="stat-mini-value" style="color:#ec4899">' + portfolio.length + '</div></div>';
    h += '</div>';
    h += '<h2 style="font-size:1rem;font-weight:600;margin-bottom:10px;">Mokami projektai</h2>';
    if (mokami.length === 0) h += '<p class="text-muted">Nėra mokamų projektų.</p>';
    else {
        h += '<table class="data-table"><thead><tr><th>Projektas</th><th>Biudžetas</th><th>Avansas</th><th>Galutinis</th><th>Likutis</th></tr></thead><tbody>';
        for (var i = 0; i < mokami.length; i++) {
            var p = mokami[i];
            var l = (p.biudzetas||0) - (p.avansas||0) - (p.galutinis||0);
            h += '<tr><td>' + p.pavadinimas + '</td><td>€' + (p.biudzetas||0) + '</td><td>€' + (p.avansas||0) + '</td><td>€' + (p.galutinis||0) + '</td><td style="color:' + (l>0?'#f59e0b':'#10b981') + ';font-weight:600;">€' + l.toFixed(2) + '</td></tr>';
        }
        h += '</tbody></table>';
    }
    if (portfolio.length > 0) {
        h += '<h2 style="font-size:1rem;font-weight:600;margin:20px 0 10px;">Portfolio</h2>';
        h += '<table class="data-table"><thead><tr><th>Projektas</th><th>Tipas</th><th>Terminas</th><th>Išlaidos</th></tr></thead><tbody>';
        for (var i = 0; i < portfolio.length; i++) {
            var p = portfolio[i];
            h += '<tr><td>' + p.pavadinimas + '</td><td>' + p.tipas + '</td><td>' + formatuotiDatą(p.terminas) + '</td><td>€' + (p.islaidos||0).toFixed(2) + '</td></tr>';
        }
        h += '</tbody></table>';
    }
    return h;
}

function genKalendorius() {
    var m = kalendoriausData.getFullYear();
    var mn = kalendoriausData.getMonth();
    var pd = new Date(m, mn + 1, 0);
    var men = ['Sausis','Vasaris','Kovas','Balandis','Gegužė','Birželis','Liepa','Rugpjūtis','Rugsėjis','Spalis','Lapkritis','Gruodis'];
    var h = '<div class="flex-between mb-3"><h1 class="page-title">Kalendorius</h1>';
    h += '<div style="display:flex;gap:8px;align-items:center;">';
    h += '<button class="btn btn-sm" onclick="keistiKalendorių(-1)">←</button>';
    h += '<span style="font-weight:600;">' + men[mn] + ' ' + m + '</span>';
    h += '<button class="btn btn-sm" onclick="keistiKalendorių(1)">→</button>';
    h += '<button class="btn btn-sm" onclick="kalendoriausData=new Date();atvaizduotiPuslapį();">Šiandien</button>';
    h += '</div></div>';
    h += '<div class="calendar-month">';
    var dienos = ['Pir','Ant','Tre','Ket','Pen','Šeš','Sek'];
    for (var i = 0; i < dienos.length; i++) h += '<div class="calendar-day-header">' + dienos[i] + '</div>';
    var pr = new Date(m, mn, 1).getDay();
    if (pr === 0) pr = 6; else pr = pr - 1;
    for (var i = 0; i < pr; i++) h += '<div class="calendar-day other-month"></div>';
    var siandien = new Date();
    for (var d = 1; d <= pd.getDate(); d++) {
        var dt = new Date(m, mn, d);
        var mm = String(dt.getMonth() + 1); if (mm.length === 1) mm = '0' + mm;
        var dd = String(dt.getDate()); if (dd.length === 1) dd = '0' + dd;
        var ds = dt.getFullYear() + '-' + mm + '-' + dd;
        var film = projektai.filter(function(p) { return p.film_data === ds; });
        var term = projektai.filter(function(p) { return p.terminas === ds; });
        var iv = '';
        for (var f = 0; f < film.length; f++) iv += '<div class="calendar-event filmavimas">🎥 ' + film[f].pavadinimas.substring(0, 12) + '</div>';
        for (var t = 0; t < term.length; t++) iv += '<div class="calendar-event terminas">⏰ ' + term[t].pavadinimas.substring(0, 12) + '</div>';
        var todayClass = (dt.toDateString() === siandien.toDateString()) ? ' today' : '';
        h += '<div class="calendar-day' + todayClass + '"><div class="calendar-day-number">' + d + '</div>' + iv + '</div>';
    }
    h += '</div>';
    h += '<div style="margin-top:12px;display:flex;gap:16px;font-size:0.75rem;">';
    h += '<span><span class="calendar-event filmavimas" style="display:inline-block;padding:2px 6px;">🎥</span> Filmavimai</span>';
    h += '<span><span class="calendar-event terminas" style="display:inline-block;padding:2px 6px;">⏰</span> Terminai</span>';
    h += '</div>';
    return h;
}

function keistiKalendorių(d) { kalendoriausData.setMonth(kalendoriausData.getMonth() + d); atvaizduotiPuslapį(); }

// MOBILAUS MENIU FUNKCIJOS
function perjungtiMobilųMeniu() {
    var sidebar = document.getElementById('sidebar');
    if (sidebar.classList.contains('open')) {
        sidebar.classList.remove('open');
    } else {
        sidebar.classList.add('open');
    }
}
function uždarytiMobilųMeniu() {
    document.getElementById('sidebar').classList.remove('open');
}

// CRUD
async function išsaugotiKlientą(e) {
    e.preventDefault();
    var id = document.getElementById('klientoId').value;
    var duom = { vardas: document.getElementById('klVardas').value, imone: document.getElementById('klImone').value, tel: document.getElementById('klTel').value, email: document.getElementById('klEmail').value };
    if (id) { await supabase.from('klientai').update(duom).eq('id', id); }
    else { await supabase.from('klientai').insert(duom); }
    await užkrautiDuomenis();
    uždarytiModalą('modalKlientas');
    return false;
}
async function trintiKlientąPagalId(id) { if (!confirm('Ištrinti?')) return; await supabase.from('klientai').delete().eq('id', id); await užkrautiDuomenis(); }
async function išsaugotiProjektą(e) {
    e.preventDefault();
    var klId = document.getElementById('projKlientas').value;
    if (!klId) { alert('Pasirinkite klientą!'); return false; }
    var id = document.getElementById('projId').value;
    var neapm = document.getElementById('projNeapmokamas').checked;
    var duom = { klientas_id: klId, pavadinimas: document.getElementById('projPavadinimas').value, tipas: document.getElementById('projTipas').value, film_data: document.getElementById('projFilmData').value || null, terminas: document.getElementById('projTerminas').value, lokacija: document.getElementById('projLokacija').value, iranga: document.getElementById('projIranga').value, statusas: document.getElementById('projStatusas').value, neapmokamas: neapm, biudzetas: neapm ? 0 : (parseFloat(document.getElementById('projBiudzetas').value) || 0), avansas: neapm ? 0 : (parseFloat(document.getElementById('projAvansas').value) || 0), galutinis: neapm ? 0 : (parseFloat(document.getElementById('projGalutinis').value) || 0), islaidos: parseFloat(document.getElementById('projIslaidos').value) || 0, workflow_progress: 0 };
    if (id) { await supabase.from('projektai').update(duom).eq('id', id); }
    else { await supabase.from('projektai').insert(duom); }
    await užkrautiDuomenis();
    uždarytiModalą('modalProjektas');
    return false;
}
async function trintiProjektąPagalId(id) { if (!confirm('Ištrinti?')) return; await supabase.from('projektai').delete().eq('id', id); await užkrautiDuomenis(); }
async function sukurtiGreitąKlientą() { var v = document.getElementById('greitasKlVardas').value.trim(); if (!v) { alert('Įveskite vardą!'); return; } await supabase.from('klientai').insert({ vardas: v }); await užkrautiDuomenis(); paslėptiGreitąKlientoPridėjimą(); }
function užpildytiKlientųSąrašą() { var sel = document.getElementById('projKlientas'); if (!sel) return; sel.innerHTML = '<option value="">-- Pasirinkite --</option>'; for (var i = 0; i < klientai.length; i++) { sel.innerHTML += '<option value="' + klientai[i].id + '">' + klientai[i].vardas + '</option>'; } }
function parodytiGreitąKlientoPridėjimą() { document.getElementById('greitasKlientoPridėjimas').classList.remove('hidden'); document.getElementById('btnPridėtiKlientą').style.display='none'; }
function paslėptiGreitąKlientoPridėjimą() { document.getElementById('greitasKlientoPridėjimas').classList.add('hidden'); document.getElementById('btnPridėtiKlientą').style.display=''; }
function perjungtiFinansųLaukelius() { var n=document.getElementById('projNeapmokamas').checked; var l=document.getElementById('finansiniaiLaukeliai'); if(l){l.style.opacity=n?'0.4':'1';l.style.pointerEvents=n?'none':'auto';} }
function atidarytiKlientoModalą(id) {
    document.getElementById('modalKlientasTitle').textContent=id?'Redaguoti klientą':'Naujas klientas';
    document.getElementById('klientoId').value=id||'';
    if(id){for(var i=0;i<klientai.length;i++){if(klientai[i].id==id){var k=klientai[i];document.getElementById('klVardas').value=k.vardas;document.getElementById('klImone').value=k.imone||'';document.getElementById('klTel').value=k.tel||'';document.getElementById('klEmail').value=k.email||'';break;}}}
    else {document.getElementById('formaKlientas').reset();}
    document.getElementById('modalKlientas').classList.remove('hidden');
}
function trintiKlientą(){var id=document.getElementById('klientoId').value;if(id){trintiKlientąPagalId(id);uždarytiModalą('modalKlientas');}}
function atidarytiProjektoModalą(id){
    document.getElementById('modalProjektasTitle').textContent=id?'Redaguoti projektą':'Naujas projektas';
    document.getElementById('projId').value=id||'';
    užpildytiKlientųSąrašą();
    if(id){for(var i=0;i<projektai.length;i++){if(projektai[i].id==id){var p=projektai[i];document.getElementById('projKlientas').value=p.klientas_id||'';document.getElementById('projPavadinimas').value=p.pavadinimas;document.getElementById('projTipas').value=p.tipas;document.getElementById('projFilmData').value=p.film_data||'';document.getElementById('projTerminas').value=p.terminas;document.getElementById('projLokacija').value=p.lokacija||'';document.getElementById('projIranga').value=p.iranga||'';document.getElementById('projStatusas').value=p.statusas||'Aktyvus';document.getElementById('projNeapmokamas').checked=p.neapmokamas||false;document.getElementById('projBiudzetas').value=p.biudzetas||0;document.getElementById('projAvansas').value=p.avansas||0;document.getElementById('projGalutinis').value=p.galutinis||0;document.getElementById('projIslaidos').value=p.islaidos||0;break;}}}
    else {document.getElementById('formaProjektas').reset();document.getElementById('projBiudzetas').value='0';document.getElementById('projAvansas').value='0';document.getElementById('projGalutinis').value='0';document.getElementById('projIslaidos').value='0';}
    document.getElementById('modalProjektas').classList.remove('hidden');
}
function trintiProjektą(){var id=document.getElementById('projId').value;if(id){trintiProjektąPagalId(id);uždarytiModalą('modalProjektas');}}
function uždarytiModalą(id){document.getElementById(id).classList.add('hidden');}
document.addEventListener('click',function(e){if(e.target.classList.contains('modal-overlay'))e.target.classList.add('hidden');});
document.addEventListener('DOMContentLoaded',function(){užkrautiDuomenis();});
</script>
